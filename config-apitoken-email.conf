# =============================================================
#  config-apitoken-email.conf
#  ไฟล์ config สำหรับ replace-token-email.sh
# =============================================================


# ╔══════════════════════════════════════════════════════════════
# ║   ✏️  กรอก Credentials ด้านล่างนี้
# ╠══════════════════════════════════════════════════════════════
# ║   CF_KEY   → API Token  หรือ  Global API Key
# ║   CF_EMAIL → ใส่ email
# ╚══════════════════════════════════════════════════════════════
# ╔══════════════════════════════════════════════════════════════
CF_KEY="64fecb5aeab2d83d9c8a030ed9881538ff3f6"
CF_EMAIL="ufavisionseoteam@gmail.com"
# ╚══════════════════════════════════════════════════════════════

# ─── ตัวเลือกเพิ่มเติม ────────────────────────────────────────
#
#  CF_CLEAR_ZONE : ล้าง zone_id เดิมออกหลังอัปเดต credential
#                  (แนะนำ "yes" เพื่อให้ plugin ดึง zone ใหม่จาก key ใหม่)
#                  "yes" / "no"
# ╔══════════════════════════════════════════════════════════════
CF_CLEAR_ZONE="yes"
# ╚══════════════════════════════════════════════════════════════
#  CF_ONLY_ACTIVE : อัปเดตเฉพาะเว็บที่เปิด Cloudflare ใน plugin ไว้แล้ว
#                   "yes" = ข้ามเว็บที่ CF ปิดอยู่
#                   "no"  = อัปเดตทุกเว็บที่มี LiteSpeed Cache active
# ╔══════════════════════════════════════════════════════════════
CF_ONLY_ACTIVE="no"
# ╚══════════════════════════════════════════════════════════════
#  CF_OVERWRITE_KEY : ถ้าเว็บนั้นมี key อยู่แล้ว จะเขียนทับไหม?
#                     "yes" = เขียนทับทุกเว็บ
#                     "no"  = ข้ามเว็บที่มี key อยู่แล้ว
# ╔══════════════════════════════════════════════════════════════
CF_OVERWRITE_KEY="yes"
# ╚══════════════════════════════════════════════════════════════
