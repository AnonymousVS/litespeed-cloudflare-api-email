# ─── cPanel Users ─────────────────────────────────────────────
# ระบุ cPanel user ที่ต้องการ (คั่นด้วย space)
# ว่าง = scan ทุก user บน server
# ตัวอย่าง: CPANEL_USERS="y2026m04ns504 jan2026newkey"
CPANEL_USERS=""

# ─── Telegram Notification ────────────────────────────────────
TELEGRAM_BOT_TOKEN="8728146015:AAHEqYfqU8DOEc99BhPNci7HOFEMVGfiaeQ"
TELEGRAM_CHAT_ID="-5107218486"

# ─── ตัวเลือก ────────────────────────────────────────────────
# CF_ONLY_ACTIVE= → หาากใส่ yes จะอัปเดตเฉพาะเว็บที่เปิด Cloudflare อยู่แล้ว
# CF_ONLY_ACTIVE= → หากใส่ no จะ อัปเดตทุกเว็บ (เปิด CF ให้ด้วย)
CF_ONLY_ACTIVE="no"

# CF_OVERWRITE_KEY= คืออะไร? → ข้ามเว็บที่มี key อยู่แล้ว ถ้าใส่ yes เวลามันไปเจอเว็บที่มีคีย์มันจะเขียนทับไม่สนใจคีย์เดิมว่าเป็นอะไร  แต่ถ้าใส่ no หากเจอ คีย์มันก็จะข้ามเว็บนั้นไปเลยไม่ทำอะไร
CF_OVERWRITE_KEY="yes"
